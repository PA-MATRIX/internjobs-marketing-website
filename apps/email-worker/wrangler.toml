name = "internjobs-email-ingest"
main = "src/index.js"
compatibility_date = "2026-05-16"

[vars]
FLY_INGEST_URL = "https://app.internjobs.ai/webhooks/email"
# v1.2 (2026-05-17): dedicated agent mailbox ingest. Receives mail to
# agent-mac@agent.internjobs.ai (Apple ID identity inbox) and future
# per-channel agent mailboxes. Distinct from /webhooks/email because the
# Fly app stores these in agent_emails (not inbound_messages).
FLY_AGENT_MAIL_URL = "https://app.internjobs.ai/webhooks/agent-mail"

# EMAIL_WORKER_SECRET is set as an encrypted secret via:
#   cd apps/email-worker && npx wrangler secret put EMAIL_WORKER_SECRET
# Never put it in this file — wrangler.toml is committed to git.

# Cloudflare Email Routing rules (configured in CF Dashboard, not here):
#
#   1. Subdomain `agent.internjobs.ai` catch-all:
#        *@agent.internjobs.ai → Send to Worker → internjobs-email-ingest
#      This is the ONLY routing target for the Worker (2026-05-16 subdomain
#      isolation update). Per-conversation aliases
#      `conv-{conversation_id}@agent.internjobs.ai` land here.
#
#   2. Apex `internjobs.ai` (human/employee email — NOT this Worker):
#        - Custom address: raj@internjobs.ai → rentalaraj@gmail.com (forward)
#        - Catch-all: *@internjobs.ai → rentalaraj@gmail.com (forward)
#      Apex mail NEVER reaches this Worker. A startup that strips the
#      subdomain in their reply lands in the human inbox, not the agent.
#
# No `[[zone]]` block needed here — CF Email Routing → Worker binding is
# configured entirely in the dashboard. The Worker's `name` (above) is what
# the dashboard rule targets.
