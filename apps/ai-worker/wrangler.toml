name = "internjobs-ai-proxy"
main = "src/index.js"
compatibility_date = "2026-05-16"

# Workers AI binding. Exposed as env.AI inside the Worker.
# Calls like env.AI.run('@cf/baai/bge-base-en-v1.5', { text }) hit the
# native Workers AI runtime — no API token needed on the Node side.
[ai]
binding = "AI"

# AI_WORKER_SECRET is set as an encrypted secret via:
#   cd apps/ai-worker && npx wrangler secret put AI_WORKER_SECRET
# Never put it in this file — wrangler.toml is committed to git.
#
# AI Gateway routing: when an AI Gateway named "internjobs-ai" exists in the
# Cloudflare account, calls automatically route through it (cache + analytics
# + per-route limits). Until the gateway is created, calls hit Workers AI
# directly. The gateway option is passed best-effort in src/index.js — no
# code change is needed when the gateway is added.
