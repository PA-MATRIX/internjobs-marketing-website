# v1.2 Phase 10 Wave 2 — Mattermost Team Edition on Fly.
#
# App name: internjobs-mattermost (org: internjobs-sios-org).
# Region: ord (same as other internjobs-* Fly apps for low-latency
# Neon Postgres access from us-east-1 / us-east-2).
# Sizing: 1x shared CPU + 1GB RAM. Mattermost recommends 512MB for
# small teams (~60 users); we run 1GB to leave room for the upcoming
# Daily.co plugin and incremental search indexes.
#
# Persistent storage: 1GB Fly volume mounted at /mattermost/data for
# file uploads + plugin storage. The DB lives on Neon, not on the
# volume — see MM_SQLSETTINGS_DATASOURCE secret.
app = "internjobs-mattermost"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

# Force-HTTPS public endpoint. Mattermost listens on :8065 inside the
# container; Fly's edge terminates TLS on :443 and proxies in.
[http_service]
  internal_port = 8065
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

# Mattermost's REST health endpoint — also used as a liveness signal.
[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/v4/system/ping"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for file uploads + plugin payloads. The volume
# itself is created out-of-band with:
#   flyctl volumes create mattermost_data --region ord --size 1
[[mounts]]
  source = "mattermost_data"
  destination = "/mattermost/data"
  initial_size = "1gb"
